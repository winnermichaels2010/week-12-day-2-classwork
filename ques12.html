<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Stats</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="p-10 bg-slate-900 text-white">
    <h1 class="text-2xl font-bold mb-10 text-center">System Overview</h1>
    <div id="dashboard" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl mx-auto"></div>

    <script>
        async function loadStats() {
            const dash = document.getElementById('dashboard');
            dash.innerHTML = "Calculating...";

            const urls = [
                'https://typicode.com',
                'https://jsonplaceholder.typicode.com/posts',
                'https://jsonplaceholder.typicode.com/todos'
            ];

            // Promise.all runs all 3 fetches at once!
            const [users, posts, todos] = await Promise.all(
                urls.map(url => fetch(url).then(r => r.json()))
            );

            dash.innerHTML = `
                <div class="bg-blue-500 p-6 rounded-xl text-center">
                    <p class="text-sm opacity-80 uppercase">Total Users</p>
                    <h2 class="text-4xl font-black">${users.length}</h2>
                </div>
                <div class="bg-purple-500 p-6 rounded-xl text-center">
                    <p class="text-sm opacity-80 uppercase">Total Posts</p>
                    <h2 class="text-4xl font-black">${posts.length}</h2>
                </div>
                <div class="bg-orange-500 p-6 rounded-xl text-center">
                    <p class="text-sm opacity-80 uppercase">Tasks Pending</p>
                    <h2 class="text-4xl font-black">${todos.filter(t => !t.completed).length}</h2>
                </div>
            `;
        }
        loadStats();
    </script>
</body>
</html>
