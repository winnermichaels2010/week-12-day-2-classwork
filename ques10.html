<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-blue-400 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-3xl shadow-2xl text-center w-80">
        <input id="city" type="text" placeholder="City name..." class="border rounded-full px-4 py-2 w-full mb-4">
        <button onclick="getWeather()" class="bg-blue-600 text-white px-4 py-2 rounded-full w-full">Check Weather</button>
        
        <div id="weather" class="mt-6 hidden">
            <h2 id="cityName" class="text-xl font-bold"></h2>
            <img id="icon" class="mx-auto" src="">
            <p id="temp" class="text-4xl font-black"></p>
            <p id="desc" class="italic text-gray-500"></p>
        </div>
    </div>

    <script>
        const API_KEY = 'PASTE_YOUR_KEY_HERE'; // Get one at openweathermap.org

        async function getWeather() {
            const city = document.getElementById('city').value;
            const res = await fetch(`https://openweathermap.org{city}&appid=${API_KEY}&units=metric`);
            if(!res.ok) return alert("City not found or API Key missing");
            const data = await res.json();

            document.getElementById('cityName').innerText = data.name;
            document.getElementById('temp').innerText = `${Math.round(data.main.temp)}°C`;
            document.getElementById('desc').innerText = data.weather[0].description;
            document.getElementById('icon').src = `https://openweathermap.org{data.weather[0].icon}@2x.png`;
            document.getElementById('weather').classList.remove('hidden');
        }
    </script>
</body>
</html>
