<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API Practice</title>
</head>
<body>

    <h1>Fetch API Practice</h1>
    <p>Open your browser's <b>Developer Tools</b> (F12 or Right-click > Inspect) and look at the <b>Console</b> tab to see the output.</p>

    <script>
      // 1. Fetch post #1 from the API
      fetch('https://jsonplaceholder.typicode.com/posts/1')
        .then(response => {
          // Check if the response is successful
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.json(); // 2. Parse the response as JSON
        })
        .then(data => {
          // 3. Log the entire response object to the console
          console.log('Full Response Object:', data);

          // 4. Log only the title property
          console.log('Title Property:', data.title);
        })
        .catch(error => {
          // Handle any errors that occur during the fetch
          console.error('There was a problem with the fetch operation:', error);
        });
    </script>

</body>
</html>
