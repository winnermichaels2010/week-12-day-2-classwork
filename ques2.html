<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exercise 2 - User Cards</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <h1 class="text-3xl font-bold mb-6 text-center">User Directory</h1>
    
    <!-- This is where our cards will go -->
    <div id="user-container" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <p>Loading users...</p>
    </div>

    <script>
        const container = document.getElementById('user-container');

        fetch('https://jsonplaceholder.typicode.com/users')
            .then(res => res.json())
            .then(users => {
                // Clear the loading text
                container.innerHTML = '';

                users.forEach(user => {
                    // Create the HTML for each card
                    const card = `
                        <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-500">
                            <h2 class="text-xl font-bold text-gray-800">${user.name}</h2>
                            <p class="text-sm text-gray-500">${user.email}</p>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            })
            .catch(err => console.error("Failed to fetch users", err));
    </script>
</body>
</html>
