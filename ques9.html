<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Post</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">
    <form id="postForm" class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h2 class="text-xl font-bold mb-4">New Blog Post</h2>
        <input id="title" type="text" placeholder="Title" required class="w-full border p-2 mb-4">
        <textarea id="body" placeholder="Content..." required class="w-full border p-2 mb-4 h-32"></textarea>
        <button type="submit" class="bg-green-600 text-white w-full py-2 rounded font-bold hover:bg-green-700">Publish</button>
    </form>
    <div id="msg" class="max-w-md mx-auto mt-4"></div>

    <script>
        document.getElementById('postForm').onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById('msg');
            msg.innerHTML = "Sending...";

            const res = await fetch('https://jsonplaceholder.typicode.com/posts', {
                method: 'POST',
                body: JSON.stringify({
                    title: document.getElementById('title').value,
                    body: document.getElementById('body').value,
                    userId: 1
                }),
                headers: { 'Content-type': 'application/json; charset=UTF-8' }
            });
            const data = await res.json();
            
            msg.innerHTML = `
                <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded">
                    <b>Success!</b> Post created with ID: ${data.id}
                </div>
            `;
        };
    </script>
</body>
</html>
