<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Poke-Finder</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-red-50 p-10 flex flex-col items-center">
    <div class="bg-white p-8 rounded-2xl shadow-xl border-4 border-red-500 w-80 text-center">
        <input id="pokeName" type="text" placeholder="e.g. pikachu" class="border-2 border-gray-300 p-2 rounded w-full mb-4">
        <button onclick="getPokemon()" class="bg-red-600 text-white font-bold py-2 px-6 rounded-full hover:bg-red-700 w-full">I Choose You!</button>
        
        <div id="pokeCard" class="mt-6 hidden">
            <h2 id="nameDisplay" class="text-2xl font-black uppercase"></h2>
            <img id="pokeImg" src="" class="mx-auto w-32 h-32">
            <div class="text-left mt-4 text-sm">
                <p><b>Height:</b> <span id="height"></span> | <b>Weight:</b> <span id="weight"></span></p>
                <div id="abilities" class="mt-2 flex flex-wrap gap-1"></div>
            </div>
        </div>
        <p id="loading" class="mt-4 hidden animate-bounce">Catching Pokémon...</p>
    </div>

    <script>
        async function getPokemon() {
            const name = document.getElementById('pokeName').value.toLowerCase().trim();
            const card = document.getElementById('pokeCard');
            const loading = document.getElementById('loading');
            if(!name) return;

            card.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                const res = await fetch(`https://pokeapi.co{name}`);
                if(!res.ok) throw new Error("Pokémon not found");
                const data = await res.json();

                document.getElementById('nameDisplay').innerText = data.name;
                document.getElementById('pokeImg').src = data.sprites.front_default;
                document.getElementById('height').innerText = data.height;
                document.getElementById('weight').innerText = data.weight;
                document.getElementById('abilities').innerHTML = data.abilities
                    .map(a => `<span class="bg-yellow-200 px-2 py-1 rounded text-xs">${a.ability.name}</span>`)
                    .join('');

                card.classList.remove('hidden');
            } catch (err) { alert(err.message); }
            finally { loading.classList.add('hidden'); }
        }
    </script>
</body>
</html>
