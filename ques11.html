<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Detail View</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="p-10 bg-gray-50">
    <button onclick="loadUser(1)" class="bg-blue-500 text-white p-2 rounded">Load User 1 Profile</button>
    <div id="profile" class="mt-8 grid md:grid-cols-2 gap-10"></div>

    <script>
        async function loadUser(id) {
            const profile = document.getElementById('profile');
            profile.innerHTML = "Loading profile...";

            // Fetch 1: User Info
            const userRes = await fetch(`https://typicode.com{id}`);
            const user = await userRes.json();

            // Fetch 2: User Posts
            const postsRes = await fetch(`https://typicode.com{id}`);
            const posts = await postsRes.json();

            profile.innerHTML = `
                <div class="bg-white p-6 rounded shadow">
                    <h1 class="text-3xl font-bold">${user.name}</h1>
                    <p class="text-blue-600">@${user.username}</p>
                    <p class="mt-4">${user.company.catchPhrase}</p>
                </div>
                <div>
                    <h2 class="text-xl font-bold mb-4">Latest Posts</h2>
                    ${posts.slice(0, 5).map(p => `<div class="p-2 border-b text-sm">${p.title}</div>`).join('')}
                </div>
            `;
        }
    </script>
</body>
</html>
